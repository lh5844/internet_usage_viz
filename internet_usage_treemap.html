<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #111;
            color: #eee;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 19px;
            font-weight: 500;
            color: #fff;
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }

        h1,
        .subtitle,
        .controls,
        .stat-row,
        .legend {
            width: 100%;
            max-width: 800px;
        }

        .subtitle {
            font-size: 12px;
            color: #777;
            margin-bottom: 16px;
        }

        .controls {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .year-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        label {
            font-size: 15px;
            color: #777;
        }

        input[type=range] {
            width: 700px;
            accent-color: #fff;
            cursor: pointer;
        }

        .year-badge {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            min-width: 56px;
            letter-spacing: -1px;
        }

        .stat-row {
            display: flex;
            gap: 20px;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .stat {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 8px 14px;
        }

        .stat-num {
            font-size: 17px;
            font-weight: 500;
        }

        .stat-label {
            font-size: 11px;
            color: #666;
            margin-top: 1px;
        }

        #treemap-wrap {
            width: 100%;
            /* Calculate height: 100vh minus the height of titles, controls, badges, and body padding */
            height: calc(100vh - 100px);
            position: relative;
            overflow: hidden;
        }

        svg {
            display: block;
            width: 100%;
            height: 100%;
        }

        .tooltip {
            position: fixed;
            background: #1e1e1e;
            border: 1px solid #333;
            padding: 10px 14px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 100;
            display: none;
            font-size: 13px;
            max-width: 220px;
        }

        .tt-name {
            font-weight: 600;
            font-size: 14px;
            color: #fff;
            margin-bottom: 4px;
        }

        .tt-val {
            color: #aaa;
        }

        .tt-region {
            font-size: 11px;
            color: #555;
            margin-top: 3px;
        }

        .legend {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .leg-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            color: #888;
        }

        .leg-dot {
            width: 10px;
            height: 10px;
            border-radius: 2px;
            flex-shrink: 0;
        }
    </style>
</head>

    <h1>Internet Users as % of Population — Treemap by Region &amp; Country</h1>

        </div>
    </div>

        const REGIONS_ORDER = [
            'North America',
            'Europe & Central Asia',
            'East Asia & Pacific',
            'Middle East & North Africa',
            'Latin America & Caribbean',
            'South Asia',
            'Sub-Saharan Africa'
        ];

        // Each region has a distinct hue; saturation/lightness encodes value
        const REGION_HUE = {
            'North America': 10,
            'Europe & Central Asia': 220,
            'East Asia & Pacific': 195,
            'Middle East & North Africa': 42,
            'Latin America & Caribbean': 140,
            'South Asia': 270,
            'Sub-Saharan Africa': 20,
        };

        const REGION_BASE = {
            'North America': '#c62828',
            'Europe & Central Asia': '#1565c0',
            'East Asia & Pacific': '#00838f',
            'Middle East & North Africa': '#f9a825',
            'Latin America & Caribbean': '#2e7d32',
            'South Asia': '#6a1b9a',
            'Sub-Saharan Africa': '#e65100',
        };

        function regionColor(region, value) {
            const hue = REGION_HUE[region] ?? 200;
            // Low value = darker, high = brighter
            const lightness = 15 + value * 0.55;
            const sat = 40 + value * 0.45;
            return `hsl(${hue}, ${sat.toFixed(0)}%, ${lightness.toFixed(0)}%)`;
        }

        function textColor(value) {
            return value > 35 ? 'rgba(255,255,255,0.92)' : 'rgba(255,255,255,0.55)';
        }

        // Build legend
        const legendEl = document.getElementById('legend');
        for (const r of REGIONS_ORDER) {
            const item = document.createElement('div');
            item.className = 'leg-item';
            const dot = document.createElement('div');
            dot.className = 'leg-dot';
            dot.style.background = REGION_BASE[r];
            item.appendChild(dot);
            item.appendChild(document.createTextNode(r));
            legendEl.appendChild(item);
        }

        function buildHierarchy(year) {
            const root = { name: 'root', children: [] };
            const regionMap = {};

            for (const r of REGIONS_ORDER) {
                const node = { name: r, children: [] };
                regionMap[r] = node;
                root.children.push(node);
            }

            let all = [];
            for (const [country, data] of Object.entries(INET)) {
                const v = data.years[year.toString()];
                if (v === undefined || v === null) continue;
                const val = Math.max(v, 0.1); // avoid zero area
                const r = data.region;
                if (regionMap[r]) {
                    regionMap[r].children.push({ name: country, value: val, rawVal: v, region: r });
                    all.push({ country, v, region: r });
                }
            }

            // Stats
            if (all.length) {
                const avg = all.reduce((s, x) => s + x.v, 0) / all.length;
                all.sort((a, b) => b.v - a.v);
                document.getElementById('s-world').textContent = avg.toFixed(1) + '%';
                document.getElementById('s-top').textContent = all[0].country + ' ' + all[0].v.toFixed(0) + '%';
                document.getElementById('s-bot').textContent = all[all.length - 1].country + ' ' + all[all.length - 1].v.toFixed(1) + '%';
                document.getElementById('s-n').textContent = all.length;
            }

            // Remove empty region nodes
            root.children = root.children.filter(r => r.children.length > 0);

            return root;
        }

        function render(year) {
            const wrap = document.getElementById('treemap-wrap');
            const W = wrap.clientWidth || 960;
            const H = Math.round(W * 0.62);

            wrap.innerHTML = '';

            const hierarchy = d3.hierarchy(buildHierarchy(year))
                .sum(d => d.value)
                .sort((a, b) => b.value - a.value);

            const treemap = d3.treemap()
                .size([W, H])
                .paddingOuter(4)
                .paddingTop(22)
                .paddingInner(2)
                .round(true);

            treemap(hierarchy);

            const svg = d3.select(wrap)
                .append('svg')
                .attr('viewBox', `0 0 ${W} ${H}`)
                .attr('width', '100%')
                .attr('height', H);

            const tooltip = document.getElementById('tooltip');

            // Draw region groups
            const regionNodes = hierarchy.children;

            regionNodes.forEach(regionNode => {
                const region = regionNode.data.name;
                const hue = REGION_HUE[region] ?? 200;
                const rgbBase = REGION_BASE[region];

                // Region background
                svg.append('rect')
                    .attr('x', regionNode.x0).attr('y', regionNode.y0)
                    .attr('width', regionNode.x1 - regionNode.x0)
                    .attr('height', regionNode.y1 - regionNode.y0)
                    .attr('fill', 'rgba(255,255,255,0.03)')
                    .attr('stroke', rgbBase)
                    .attr('stroke-width', 1.5)
                    .attr('rx', 3);

                // Region label header
                const rw = regionNode.x1 - regionNode.x0;
                if (rw > 60) {
                    svg.append('text')
                        .attr('x', regionNode.x0 + 6)
                        .attr('y', regionNode.y0 + 15)
                        .attr('fill', rgbBase)
                        .attr('font-size', Math.min(11, rw / 12))
                        .attr('font-weight', '600')
                        .attr('letter-spacing', '0.04em')
                        .text(region.toUpperCase());
                }

                // Country leaves
                const leaves = regionNode.leaves ? regionNode.leaves() : regionNode.children;
                leaves.forEach(leaf => {
                    const lw = leaf.x1 - leaf.x0;
                    const lh = leaf.y1 - leaf.y0;
                    const val = leaf.data.rawVal;
                    const fillColor = regionColor(region, val);

                    const g = svg.append('g')
                        .attr('transform', `translate(${leaf.x0},${leaf.y0})`);

                    g.append('rect')
                        .attr('width', lw).attr('height', lh)
                        .attr('fill', fillColor)
                        .attr('rx', 2)
                        .style('cursor', 'default');

                    // Country name
                    if (lw > 22 && lh > 14) {
                        const fontSize = Math.min(10, Math.max(7, lw / 10));
                        const name = leaf.data.name;

                        // Abbreviate if needed
                        let label = name;
                        if (lw < 55) {
                            // Use first word or abbreviation
                            const words = name.split(' ');
                            label = words[0].length <= 8 ? words[0] : words[0].substring(0, 6) + '.';
                        } else if (lw < 80 && name.length > 12) {
                            label = name.substring(0, 10) + '…';
                        }

                        g.append('text')
                            .attr('x', lw / 2).attr('y', lh / 2 - (lh > 28 ? 5 : 0))
                            .attr('text-anchor', 'middle')
                            .attr('dominant-baseline', 'middle')
                            .attr('fill', textColor(val))
                            .attr('font-size', `${fontSize}px`)
                            .attr('font-weight', '500')
                            .text(label);

                        if (lh > 26 && lw > 35) {
                            g.append('text')
                                .attr('x', lw / 2).attr('y', lh / 2 + 8)
                                .attr('text-anchor', 'middle')
                                .attr('dominant-baseline', 'middle')
                                .attr('fill', textColor(val))
                                .attr('font-size', `${Math.max(7, fontSize - 1)}px`)
                                .attr('opacity', 0.75)
                                .text(val.toFixed(0) + '%');
                        }
                    }

                    g.on('mousemove', function (event) {
                        tooltip.style.display = 'block';
                        tooltip.style.left = (event.clientX + 14) + 'px';
                        tooltip.style.top = (event.clientY - 10) + 'px';
                        tooltip.innerHTML = `
          <div class="tt-name">${leaf.data.name}</div>
          <div class="tt-val">${year}: <strong>${val.toFixed(1)}%</strong> internet users</div>
          <div class="tt-region">${region}</div>`;
                    })
                        .on('mouseleave', () => { tooltip.style.display = 'none'; });
                });
            });
        }

        let currentYear = 2016;
        render(currentYear);

        document.getElementById('year-slider').addEventListener('input', function () {
            currentYear = +this.value;
            document.getElementById('year-badge').textContent = currentYear;
            render(currentYear);
        });

        window.addEventListener('resize', () => render(currentYear));
    </script>
