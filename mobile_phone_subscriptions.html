            font-size: 10px;
            font-weight: 600;

        }

            display: block;
            overflow: visible;
        }

        .ax-label {
            font-size: 9px;
            fill: #ccc;
        }

        .grid-line {
            stroke: #f0ede8;
            stroke-width: 1;
        }

        .hundred-line {
            stroke: #ddd;
            stroke-width: 0.8;
            stroke-dasharray: 3, 2;
        }

        .bg-line {
            fill: none;
            stroke-width: 1;
            opacity: 0.15;
        }

        .top-line {
            fill: none;
            stroke-width: 2.5;
            stroke-linejoin: round;
            stroke-linecap: round;
        }

        .top-fill {
            opacity: 0.07;
        }

        .tooltip {
            position: fixed;
            background: #111;
            color: #fff;
            padding: 9px 13px;
            border-radius: 7px;
            pointer-events: none;
            z-index: 100;
            display: none;
            font-size: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);

        .tt-name {
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 2px;
        }

        .tt-val {
            color: #999;
        }
    </style>
</head>

        const COLORS = { "North America": "#d94f3d", "Europe & Central Asia": "#5c6bc0", "East Asia & Pacific": "#00897b", "Middle East & North Africa": "#f0a500", "Latin America & Caribbean": "#43a047", "South Asia": "#8e44ad", "Sub-Saharan Africa": "#e8622a", "World": "#37474f" };
        const REGIONS_ORDER = ["North America", "Europe & Central Asia", "East Asia & Pacific", "Middle East & North Africa", "Latin America & Caribbean", "South Asia", "Sub-Saharan Africa", "World"];

        const GLOBAL_MAX = 220;
        const YEARS = Array.from({ length: 30 }, (_, i) => 1990 + i);
        const tooltip = document.getElementById('tooltip');

        function buildPanel(region) {
            const rd = DATA[region];
            const color = COLORS[region] || '#555';
            const isWorld = region === 'World';

            const W = 240, H = 150;
            const PAD = { l: 26, r: 8, t: 6, b: 20 };
            const pw = W - PAD.l - PAD.r;
            const ph = H - PAD.t - PAD.b;

            const xs = yr => PAD.l + ((yr - 1990) / 29) * pw;
            const ys = val => PAD.t + ph - (val / GLOBAL_MAX) * ph;

            function path(pts) {
                const v = pts.filter(p => p[1] > 0);
                if (v.length < 2) return '';
                return v.map((p, i) => (i === 0 ? 'M' : 'L') + xs(p[0]).toFixed(1) + ',' + ys(p[1]).toFixed(1)).join(' ');
            }

            function fillPath(pts, pd) {
                if (!pd) return '';
                const v = pts.filter(p => p[1] > 0);
                if (v.length < 2) return '';
                const last = v[v.length - 1], first = v[0];
                return pd + ` L${xs(last[0]).toFixed(1)},${ys(0).toFixed(1)} L${xs(first[0]).toFixed(1)},${ys(0).toFixed(1)} Z`;
            }

            // Grid
            let gridSVG = '';
            [0, 50, 100, 150, 200].forEach(v => {
                const y = ys(v);
                const cls = v === 100 ? 'hundred-line' : 'grid-line';
                gridSVG += `<line class="${cls}" x1="${PAD.l}" x2="${W - PAD.r}" y1="${y.toFixed(1)}" y2="${y.toFixed(1)}"/>`;
                if (v === 0 || v === 100 || v === 200)
                    gridSVG += `<text class="ax-label" x="${(PAD.l - 3).toFixed(1)}" y="${(y + 3).toFixed(1)}" text-anchor="end">${v}</text>`;
            });

            // X ticks
            let xSVG = '';
            [1990, 2000, 2010, 2019].forEach(yr => {
                xSVG += `<text class="ax-label" x="${xs(yr).toFixed(1)}" y="${(ys(0) + 13).toFixed(1)}" text-anchor="middle">${yr}</text>`;
            });

            // Background lines
            let bgSVG = '';
            rd.lines.filter(l => !l.top).forEach(l => {
                const p = path(l.pts);
                if (p) bgSVG += `<path class="bg-line" d="${p}" stroke="${color}" data-name="${l.name}"/>`;
            });

            // Top line
            const topLine = rd.lines.find(l => l.top);
            let topSVG = '';
            if (topLine) {
                const p = path(topLine.pts);
                const f = fillPath(topLine.pts, p);
                if (p) {
                    topSVG = `<path class="top-fill" d="${f}" fill="${color}"/>
                <path class="top-line" d="${p}" stroke="${color}"/>`;
                    const v = topLine.pts.filter(pt => pt[1] > 0);
                    if (v.length) {
                        const last = v[v.length - 1];
                        topSVG += `<circle cx="${xs(last[0]).toFixed(1)}" cy="${ys(last[1]).toFixed(1)}" r="3" fill="${color}" stroke="white" stroke-width="1.5"/>`;
                    }
                }
            }

            const panel = document.createElement('div');
            panel.className = 'panel' + (isWorld ? ' world-panel' : '');

            const regionShort = region
                .replace('Europe & Central Asia', 'Europe & C. Asia')
                .replace('Latin America & Caribbean', 'Lat. America & Carib.')
                .replace('Middle East & North Africa', 'Middle East & N. Africa');

            const topLabel = isWorld
                ? `<span class="top-badge" style="background:${color}18;color:${color}">⌀ World mean &nbsp;·&nbsp; ${rd.topVal} per 100</span>`
                : `<span class="top-badge" style="background:${color}18;color:${color}">▲ ${rd.top} &nbsp;·&nbsp; ${rd.topVal} per 100</span>`;

            panel.innerHTML = `
    <div class="region-label" style="color:${color}">${isWorld ? '🌐 World' : regionShort}</div>
    <div class="panel-sub">${rd.n} ${isWorld ? 'countries total' : 'countries'}</div>
    ${topLabel}
    <div class="chart-wrap">
      <svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}">
        ${gridSVG}${xSVG}${bgSVG}${topSVG}
      </svg>
    </div>`;

            // Tooltip on bg lines
            panel.querySelectorAll('.bg-line').forEach(el => {
                el.style.cursor = 'default';
                el.addEventListener('mousemove', e => {
                    const name = el.dataset.name;
                    const line = rd.lines.find(l => l.name === name);
                    const last = line?.pts.slice(-1)[0];
                    tooltip.style.display = 'block';
                    tooltip.style.left = (e.clientX + 14) + 'px';
                    tooltip.style.top = (e.clientY - 10) + 'px';
                    tooltip.innerHTML = `<div class="tt-name">${name}</div><div class="tt-val">${last ? '2019: ' + last[1] + ' per 100' : ''}</div>`;
                });
                el.addEventListener('mouseleave', () => { tooltip.style.display = 'none'; });
            });

            return panel;
        }

        const grid = document.getElementById('grid');
        for (const r of REGIONS_ORDER) {
            if (DATA[r]) grid.appendChild(buildPanel(r));
        }
    </script>
